name: release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip
          - goos: windows
            goarch: arm64
            archive_ext: zip

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail

          binary_name=todolist
          if [ "$GOOS" = "windows" ]; then
            binary_name=todolist.exe
          fi

          asset_basename="todolist_${VERSION}_${GOOS}_${GOARCH}"
          workdir="dist/${asset_basename}"
          mkdir -p "$workdir"

          go build \
            -trimpath \
            -buildvcs=true \
            -ldflags "-s -w -X github.com/kwo/todolist/pkg/cli.Version=${VERSION}" \
            -o "$workdir/$binary_name" \
            .

          cp README.md "$workdir/README.md"
          cp USAGE.md "$workdir/USAGE.md"

          mkdir -p dist
          if [ "$ARCHIVE_EXT" = "zip" ]; then
            (
              cd dist
              zip -r "${asset_basename}.zip" "${asset_basename}"
            )
          else
            tar -C dist -czf "dist/${asset_basename}.tar.gz" "${asset_basename}"
          fi

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/todolist_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  checksums:
    name: checksums
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '*'
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum todolist_* > SHA256SUMS

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/SHA256SUMS
          if-no-files-found: error

  release:
    name: github-release
    runs-on: ubuntu-latest
    needs:
      - build
      - checksums

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '*'
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/todolist_*.tar.gz
            dist/todolist_*.zip
            dist/SHA256SUMS
